name: Publicar versão Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validar versão da tag
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(\d+\.\d+\.\d+)(?:[-+].*)?$') {
            throw "Use uma tag como v1.0.0 ou v1.0.0-beta.1. Recebido: $tag"
          }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION=$($Matches[1])" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "IS_PRERELEASE=$($tag.Contains('-').ToString().ToLower())" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Compilar e testar
        shell: powershell
        run: ./mvnw.cmd --batch-mode verify

      - name: Instalar WiX Toolset 3
        shell: powershell
        run: |
          choco install wixtoolset --no-progress --yes
          $programFilesX86 = [Environment]::GetFolderPath('ProgramFilesX86')
          $wix = Get-ChildItem $programFilesX86 -Filter candle.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $wix) { throw 'candle.exe do WiX Toolset não encontrado.' }
          $wix.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Gerar versão portátil
        shell: powershell
        run: |
          ./scripts/package-windows.ps1 -Type app-image -AppVersion $env:APP_VERSION
          Compress-Archive -Path 'dist/Agenda Eliza Hair/*' -DestinationPath "dist/AgendaElizaHair-portable-$($env:RELEASE_TAG).zip"

      - name: Gerar instalador
        shell: powershell
        run: |
          ./scripts/package-windows.ps1 -Type exe -AppVersion $env:APP_VERSION
          $installer = Get-ChildItem dist -Filter '*.exe' | Select-Object -First 1
          if ($null -eq $installer) { throw 'Instalador EXE não encontrado.' }
          Move-Item $installer.FullName "dist/AgendaElizaHair-Setup-$($env:RELEASE_TAG).exe" -Force

      # A assinatura digital será inserida aqui antes da criação dos checksums.
      - name: Calcular checksums SHA-256
        shell: powershell
        run: |
          $arquivos = Get-ChildItem dist -File | Where-Object { $_.Extension -in '.exe', '.zip' }
          $linhas = foreach ($arquivo in $arquivos) {
            $hash = (Get-FileHash $arquivo.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($arquivo.Name)"
          }
          $linhas | Set-Content 'dist/SHA256SUMS.txt' -Encoding ascii

      - name: Publicar GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $argumentos = @(
            'release', 'create', $env:RELEASE_TAG,
            "dist/AgendaElizaHair-Setup-$($env:RELEASE_TAG).exe",
            "dist/AgendaElizaHair-portable-$($env:RELEASE_TAG).zip",
            'dist/SHA256SUMS.txt',
            '--title', "Agenda Eliza Hair $($env:RELEASE_TAG)",
            '--generate-notes'
          )
          if ($env:IS_PRERELEASE -eq 'true') {
            $argumentos += '--prerelease'
          }
          & gh @argumentos
          if ($LASTEXITCODE -ne 0) { throw 'Não foi possível criar a GitHub Release.' }
